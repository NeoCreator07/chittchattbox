<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0e0f13;
      --surface: #14161d;
      --border:  #1d2030;
      --accent:  #5cefb0;
      --blue:    #4fc3f7;
      --muted:   #343850;
      --text:    #d0d8f0;
      --dim:     #5a6380;
      --danger:  #ff5f7e;
      --font-mono: 'IBM Plex Mono', monospace;
      --font-sans: 'IBM Plex Sans', sans-serif;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-sans); overflow: hidden; }

    #setup {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg); z-index: 10; padding: 1.5rem;
    }
    .card {
      width: 100%; max-width: 360px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 2.5rem 2rem;
      display: flex; flex-direction: column; gap: 1.5rem;
      animation: fadeUp .35s ease both;
    }
    .logo {
      font-family: var(--font-mono); font-size: .8rem;
      letter-spacing: .15em; color: var(--accent);
      display: flex; align-items: center; gap: .5rem;
    }
    .logo::before {
      content: ''; width: 8px; height: 8px; background: var(--accent);
      border-radius: 50%; box-shadow: 0 0 8px var(--accent); display: inline-block;
    }
    .card h1 { font-size: 1.55rem; font-weight: 300; line-height: 1.3; color: #fff; }
    .card h1 strong { font-weight: 500; }
    .field { display: flex; flex-direction: column; gap: .4rem; }
    .field label {
      font-family: var(--font-mono); font-size: .65rem;
      letter-spacing: .12em; text-transform: uppercase; color: var(--dim);
    }
    .field input {
      background: var(--bg); border: 1px solid var(--muted);
      border-radius: 8px; padding: .75rem 1rem;
      color: var(--text); font-family: var(--font-mono);
      font-size: 1rem; outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .field input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(92,239,176,.1); }
    .field input::placeholder { color: var(--muted); }
    .field input.error { border-color: var(--danger) !important; box-shadow: 0 0 0 3px rgba(255,95,126,.12) !important; }

    .error-msg {
      font-family: var(--font-mono);
      font-size: .7rem;
      color: var(--danger);
      display: none;
      animation: fadeUp .2s ease both;
    }
    .error-msg.show { display: block; }

    .join-btn {
      padding: .82rem; background: var(--accent); color: #0a0c10;
      font-family: var(--font-mono); font-size: .9rem; font-weight: 600;
      letter-spacing: .05em; border: none; border-radius: 9px;
      cursor: pointer; transition: opacity .15s, transform .1s;
    }
    .join-btn:hover { opacity: .87; }
    .join-btn:active { transform: scale(.98); }

    #app { display: none; height: 100vh; flex-direction: column; }
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: .8rem 1.25rem; background: var(--surface);
      border-bottom: 1px solid var(--border); flex-shrink: 0; gap: 1rem;
    }
    .status { display: flex; align-items: center; gap: .6rem; }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent); box-shadow: 0 0 7px var(--accent);
      animation: pulse 2.4s ease-in-out infinite;
    }
    .status-text { font-family: var(--font-mono); font-size: .75rem; color: var(--dim); }
    .status-text strong { color: var(--accent); font-weight: 600; }
    .name-chip {
      font-family: var(--font-mono); font-size: .75rem; color: var(--dim);
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 20px; padding: .3rem .85rem; cursor: pointer;
      transition: border-color .2s, color .2s; white-space: nowrap;
    }
    .name-chip:hover { border-color: var(--muted); color: var(--text); }

    #messages {
      flex: 1; overflow-y: auto;
      padding: 1rem 1.25rem 1.2rem;
      display: flex; flex-direction: column; gap: .1rem;
      scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 3px; }
    #messages::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 3px; }
    .msg {
      display: flex; align-items: baseline; gap: .55rem;
      padding: .3rem .5rem; border-radius: 6px;
      animation: msgIn .18s ease both; line-height: 1.6;
    }
    .msg:hover { background: rgba(255,255,255,.025); }
    .msg-time { font-family: var(--font-mono); font-size: .62rem; color: var(--muted); flex-shrink: 0; user-select: none; }
    .msg-name { font-family: var(--font-mono); font-size: .78rem; font-weight: 600; flex-shrink: 0; }
    .msg-text { font-size: .9rem; color: var(--text); word-break: break-word; flex: 1; }
    .msg.self  .msg-name { color: var(--accent); }
    .msg.other .msg-name { color: var(--blue); }
    .msg.system { opacity: .45; }
    .msg.system .msg-text { color: var(--dim); font-style: italic; font-size: .8rem; }

    footer { padding: .8rem 1.25rem; background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0; }
    .input-row { display: flex; gap: .6rem; }
    .input-row input {
      flex: 1; background: var(--bg); border: 1px solid var(--border);
      border-radius: 9px; padding: .7rem 1rem; color: var(--text);
      font-family: var(--font-sans); font-size: .92rem; outline: none;
      transition: border-color .2s;
    }
    .input-row input:focus { border-color: var(--muted); }
    .input-row input::placeholder { color: var(--muted); }
    .send-btn {
      background: none; border: 1px solid var(--muted);
      border-radius: 9px; padding: .7rem 1rem; color: var(--dim);
      cursor: pointer; font-size: 1.05rem; line-height: 1;
      transition: border-color .15s, color .15s, background .15s;
    }
    .send-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(92,239,176,.07); }

    @keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
    @keyframes msgIn  { from { opacity:0; transform:translateX(-3px); } to { opacity:1; transform:translateX(0); } }
    @keyframes pulse  { 0%,100% { opacity:1; } 50% { opacity:.25; } }
  </style>
</head>
<body>

<div id="setup">
  <div class="card">
    <div class="logo">localchat</div>
    <h1>What's your <strong>name?</strong></h1>
    <div class="field">
      <label>Display name</label>
      <input id="nameInput" type="text" placeholder="e.g. Sarah" maxlength="28" autocomplete="off" />
      <span class="error-msg" id="nameError">⚠ That name isn't allowed. Please choose another.</span>
    </div>
    <button class="join-btn" onclick="join()">→ start chatting</button>
  </div>
</div>

<div id="app">
  <header>
    <div class="status">
      <div class="dot"></div>
      <div class="status-text">everyone on this page &nbsp;·&nbsp; <strong>live</strong></div>
    </div>
    <div class="name-chip" onclick="rename()" title="Click to change name">
      you: <span id="nameLabel"></span>
    </div>
  </header>
  <div id="messages"></div>
  <footer>
    <div class="input-row">
      <input id="msgInput" type="text" placeholder="say something…" maxlength="500" autocomplete="off" />
      <button class="send-btn" onclick="send()">↑</button>
    </div>
  </footer>
</div>

<script>
  // ── Profanity filter ────────────────────────────────────────────────────────
  // Normalise leet-speak & common substitutions before checking
  function normalise(str) {
    return str.toLowerCase()
      .replace(/[@4]/g, 'a')
      .replace(/[38]/g, 'e')
      .replace(/[1!|]/g, 'i')
      .replace(/[0]/g, 'o')
      .replace(/[$5]/g, 's')
      .replace(/[7]/g, 't')
      .replace(/[+]/g, 't')
      .replace(/[xX]/g, 'x')
      .replace(/\s+/g, '');
  }

  // Word list — covers slurs, explicit terms, and common insults
  const BAD_WORDS = [
    'fuck','fuk','fucc','fck','fvck','f u c k',
    'shit','sht','sh1t','$hit',
    'bitch','biatch','b1tch','bytch',
    'ass','arse','asshole','arsehole',
    'cunt','cvnt',
    'dick','dik','d1ck',
    'cock','cok',
    'pussy','pussy',
    'nigger','nigga','n1gger','n1gga','nigg',
    'faggot','fag','f4g','fagot',
    'whore','wh0re',
    'slut','sl*t',
    'bastard','bstrd',
    'twat',
    'prick',
    'retard','retarded',
    'spastic',
    'kike',
    'chink',
    'spic','spik',
    'wetback',
    'tranny',
    'shemale',
    'rape','rapist',
    'molest','molester',
    'pedophile','paedophile','pedo','paedo',
    'nazi','naz1',
    'hitler',
    'porn','p0rn',
    'sex','s3x',
    'penis','pen1s',
    'vagina','vag1na',
    'anus',
    'boob','b00b',
    'tit','t1t',
    'cum','c*m',
    'jizz',
    'dildo',
    'wank','w4nk',
    'tosser',
    'bollocks',
    'bellend',
    'motherfucker','mofo','mf',
    'crap',
    'damn','damnit',
    'hell', // mild but flagged
    'idiot','1diot',
    'stupid',
    'dumbass',
    'loser',
    'moron',
    'imbecile',
    'jackass',
    'douchebag','douche',
    'scumbag',
    'pissed','piss',
    'boner',
    'horny',
    'anal',
    'blowjob','bj',
    'handjob',
    'hardcore',
    'hentai',
    'lolicon',
  ];

  function isBadName(name) {
    const norm = normalise(name);
    return BAD_WORDS.some(w => {
      const nw = normalise(w);
      // exact match OR contained as a substring
      return norm === nw || norm.includes(nw);
    });
  }

  // ── state ──────────────────────────────────────────────
  let gun, chat, myName;
  const seen = new Set();

  const savedName = localStorage.getItem('lc_name') || '';
  if (savedName) document.getElementById('nameInput').value = savedName;

  document.getElementById('nameInput').addEventListener('keypress', e => {
    if (!/^[a-zA-Z ]$/.test(e.key)) e.preventDefault();
  });
  document.getElementById('nameInput').addEventListener('input', e => {
    e.target.value = e.target.value.replace(/[^a-zA-Z ]/g, '');
    clearError();
  });
  document.getElementById('nameInput').addEventListener('keydown', e => { if (e.key === 'Enter') join(); });
  document.getElementById('msgInput').addEventListener('keydown',  e => { if (e.key === 'Enter') send(); });

  function showError(msg) {
    const inp = document.getElementById('nameInput');
    const err = document.getElementById('nameError');
    inp.classList.add('error');
    err.textContent = msg || '⚠ That name isn\'t allowed. Please choose another.';
    err.classList.add('show');
    inp.focus();
  }
  function clearError() {
    document.getElementById('nameInput').classList.remove('error');
    document.getElementById('nameError').classList.remove('show');
  }

  // ── join ───────────────────────────────────────────────
  function join() {
    const raw = document.getElementById('nameInput').value.trim();

    if (!raw) { showError('⚠ Please enter a name.'); return; }
    if (!/^[a-zA-Z ]+$/.test(raw)) { showError('⚠ Letters only — no numbers or special characters.'); return; }
    if (raw.length < 2) { showError('⚠ Name must be at least 2 characters.'); return; }
    if (isBadName(raw)) { showError('⚠ That name isn\'t allowed. Please choose another.'); return; }

    myName = raw;
    localStorage.setItem('lc_name', myName);

    document.getElementById('setup').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('nameLabel').textContent = myName;

    gun  = Gun(['https://gun-manhattan.herokuapp.com/gun', 'https://gun-us.herokuapp.com/gun']);
    chat = gun.get('localchat-shared-room');

    sysMsg('you joined as ' + myName);

    chat.map().on((data, key) => {
      if (!data || seen.has(key)) return;
      seen.add(key);
      if (data.ts && Date.now() - data.ts > 8 * 60 * 60 * 1000) return;
      renderMsg(data);
    });

    document.getElementById('msgInput').focus();
  }

  // ── send ───────────────────────────────────────────────
  function send() {
    const inp = document.getElementById('msgInput');
    const text = inp.value.trim();
    if (!text) return;
    inp.value = '';
    const key = Date.now() + '-' + Math.random().toString(36).slice(2, 8);
    chat.get(key).put({ name: myName, text, ts: Date.now() });
  }

  // ── render ─────────────────────────────────────────────
  function renderMsg(data) {
    const box = document.getElementById('messages');
    const isSelf = data.name === myName;
    const wrap = document.createElement('div');
    wrap.className = 'msg ' + (isSelf ? 'self' : 'other');
    const time = document.createElement('span'); time.className = 'msg-time'; time.textContent = fmt(data.ts);
    const name = document.createElement('span'); name.className = 'msg-name'; name.textContent = data.name + ':';
    const txt  = document.createElement('span'); txt.className  = 'msg-text'; txt.textContent  = data.text;
    wrap.append(time, name, txt);
    box.appendChild(wrap);
    box.scrollTop = box.scrollHeight;
  }

  function sysMsg(text) {
    const box = document.getElementById('messages');
    const wrap = document.createElement('div'); wrap.className = 'msg system';
    const txt = document.createElement('span'); txt.className = 'msg-text'; txt.textContent = '— ' + text;
    wrap.appendChild(txt); box.appendChild(wrap); box.scrollTop = box.scrollHeight;
  }

  // ── rename ─────────────────────────────────────────────
  function rename() {
    const n = prompt('Change your name:', myName);
    if (!n || !n.trim()) return;
    const raw = n.trim();
    if (raw === myName) return;
    if (raw.length < 2) { alert('Name must be at least 2 characters.'); return; }
    if (isBadName(raw)) { alert('That name isn\'t allowed. Please choose another.'); return; }
    const old = myName; myName = raw;
    document.getElementById('nameLabel').textContent = myName;
    localStorage.setItem('lc_name', myName);
    sysMsg(old + ' is now ' + myName);
  }

  function fmt(ts) {
    if (!ts) return '';
    const d = new Date(ts);
    return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
  }
</script>
</body>
</html>
