<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>localchat</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0e14;--sidebar:#0f111a;--surface:#131722;--card:#181c28;
  --border:#1e2436;--border2:#252c40;--accent:#e8ff6b;--accent-dim:rgba(232,255,107,.12);
  --green:#56f0a0;--blue:#60c8ff;--muted:#2b3148;--text:#c8d0e8;--dim:#49536e;
  --online:#56f0a0;--danger:#ff6b6b;--danger-dim:rgba(255,107,107,.1);
  --font-mono:'DM Mono',monospace;--font-sans:'Syne',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-sans);overflow:hidden;font-size:14px}

/* ── SCREENS ── */
.screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:30;padding:1.5rem}
.screen.hidden{display:none}
.panel{width:100%;max-width:420px;background:var(--card);border:1px solid var(--border);border-radius:18px;padding:2.5rem 2.2rem;display:flex;flex-direction:column;gap:1.6rem;animation:fadeUp .4s ease both}
.brand{display:flex;align-items:center;gap:.6rem}
.brand-dot{width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent);flex-shrink:0}
.brand-name{font-family:var(--font-mono);font-size:.78rem;letter-spacing:.16em;color:var(--accent);font-weight:500}
.panel-title{font-size:1.65rem;font-weight:600;color:#e8edf8;line-height:1.25}
.panel-title span{color:var(--accent)}
.field{display:flex;flex-direction:column;gap:.5rem}
.field label{font-family:var(--font-mono);font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--dim)}
.field input{background:var(--bg);border:1px solid var(--muted);border-radius:10px;padding:.72rem 1rem;color:var(--text);font-family:var(--font-mono);font-size:.88rem;outline:none;transition:border-color .2s,box-shadow .2s}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(232,255,107,.08)}
.field input::placeholder{color:var(--dim)}
.primary-btn{padding:.85rem;background:var(--accent);color:#0a0c10;font-family:var(--font-mono);font-size:.88rem;font-weight:500;letter-spacing:.04em;border:none;border-radius:10px;cursor:pointer;transition:opacity .15s,transform .1s}
.primary-btn:hover{opacity:.88}
.primary-btn:active{transform:scale(.98)}
.ghost-btn{padding:.7rem;background:none;border:1px solid var(--border2);color:var(--dim);font-family:var(--font-mono);font-size:.8rem;border-radius:10px;cursor:pointer;transition:border-color .2s,color .2s}
.ghost-btn:hover{border-color:var(--text);color:var(--text)}
.err-msg{font-family:var(--font-mono);font-size:.72rem;color:#ff6b6b;min-height:1rem}

/* ── APP ── */
#app{display:none;height:100vh;flex-direction:row}

/* ── SIDEBAR ── */
#sidebar{width:210px;min-width:210px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sb-head{padding:.9rem 1rem .75rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.5rem;flex-shrink:0}
.sb-head .brand-name{font-size:.7rem}
.sb-head .brand-dot{width:8px;height:8px}
.sb-section{padding:.85rem 1rem .35rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.sb-label{font-family:var(--font-mono);font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:var(--dim)}
.sb-add{background:none;border:none;color:var(--dim);cursor:pointer;font-size:.9rem;padding:0 .15rem;transition:color .15s;line-height:1}
.sb-add:hover{color:var(--accent)}
.srv-list{display:flex;flex-direction:column;gap:.05rem;padding:0 .5rem;flex-shrink:0}
.srv-item{display:flex;align-items:center;gap:.5rem;padding:.45rem .65rem;border-radius:7px;cursor:pointer;transition:background .15s;font-size:.82rem;color:var(--dim)}
.srv-item:hover{background:rgba(255,255,255,.04);color:var(--text)}
.srv-item.active{background:var(--accent-dim);color:var(--accent)}
.srv-hash{font-family:var(--font-mono);font-size:.75rem;color:var(--muted);flex-shrink:0}
.srv-item.active .srv-hash{color:var(--accent);opacity:.6}
.sb-divider{height:1px;background:var(--border);margin:.65rem .85rem}
.member-scroll{flex:1;overflow-y:auto;min-height:0}
.member-scroll::-webkit-scrollbar{width:3px}
.member-scroll::-webkit-scrollbar-thumb{background:var(--muted);border-radius:3px}
.mem-list{display:flex;flex-direction:column;gap:.03rem;padding:0 .5rem .5rem}
.mem-item{display:flex;align-items:center;gap:.5rem;padding:.38rem .65rem;border-radius:7px;font-size:.8rem;color:var(--dim)}
.mem-item.me{color:var(--text)}
.mem-dot{width:7px;height:7px;border-radius:50%;background:var(--online);flex-shrink:0;box-shadow:0 0 5px var(--online)}
.mem-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.you-badge{font-family:var(--font-mono);font-size:.55rem;color:var(--accent);opacity:.7;flex-shrink:0}
.sb-foot{padding:.6rem .75rem;border-top:1px solid var(--border);flex-shrink:0}
.me-row{display:flex;align-items:center;gap:.55rem;padding:.42rem .65rem;border-radius:8px;cursor:pointer;transition:background .15s}
.me-row:hover{background:rgba(255,255,255,.04)}
.me-avatar{width:28px;height:28px;border-radius:8px;background:var(--accent-dim);border:1px solid rgba(232,255,107,.2);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:.72rem;color:var(--accent);font-weight:500;flex-shrink:0}
.me-name{font-size:.8rem;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.me-edit{font-size:.7rem;color:var(--dim)}

/* ── MAIN ── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.chat-bar{display:flex;align-items:center;gap:.6rem;padding:.8rem 1.4rem;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.chat-hash{font-family:var(--font-mono);font-size:.85rem;color:var(--dim)}
.chat-title{font-family:var(--font-sans);font-size:.9rem;font-weight:600;color:var(--text)}
.chat-sep{width:1px;height:14px;background:var(--border2)}
.chat-online{font-family:var(--font-mono);font-size:.65rem;color:var(--dim);display:flex;align-items:center;gap:.35rem;flex:1}
.ol-dot{width:6px;height:6px;border-radius:50%;background:var(--online);flex-shrink:0}
.delete-chat-btn{background:none;border:1px solid transparent;border-radius:7px;padding:.3rem .6rem;color:var(--dim);font-size:.8rem;cursor:pointer;transition:all .15s;flex-shrink:0;font-family:var(--font-mono);font-size:.65rem;letter-spacing:.05em}
.delete-chat-btn:hover{border-color:var(--danger);color:var(--danger);background:var(--danger-dim)}
.status-bar{display:none;align-items:center;gap:.5rem;padding:.35rem 1.4rem;background:rgba(255,107,107,.08);border-bottom:1px solid rgba(255,107,107,.15);font-family:var(--font-mono);font-size:.65rem;color:#ff8a8a;flex-shrink:0}
.status-bar.show{display:flex}

#messages{flex:1;overflow-y:auto;padding:1rem 1.4rem;display:flex;flex-direction:column;gap:.06rem;scroll-behavior:smooth}
#messages::-webkit-scrollbar{width:4px}
#messages::-webkit-scrollbar-thumb{background:var(--muted);border-radius:4px}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.5rem;opacity:.35}
.empty-icon{font-size:2.2rem}
.empty-text{font-size:.85rem;color:var(--dim)}

.msg{display:flex;align-items:flex-start;gap:.6rem;padding:.32rem .55rem;border-radius:7px;animation:msgIn .16s ease both;position:relative}
.msg:hover{background:rgba(255,255,255,.025)}
.msg-time{font-family:var(--font-mono);font-size:.6rem;color:var(--muted);flex-shrink:0;user-select:none;min-width:32px;padding-top:.22rem}
.msg-name{font-family:var(--font-mono);font-size:.75rem;font-weight:500;flex-shrink:0;padding-top:.18rem}
.msg-body{display:flex;flex-direction:column;flex:1;min-width:0;gap:.3rem}
.msg-text{font-size:.86rem;color:var(--text);word-break:break-word;line-height:1.65}
.msg.self .msg-name{color:var(--accent)}
.msg.other .msg-name{color:var(--blue)}
.msg.sys{opacity:.38}
.msg.sys .msg-text{font-style:italic;font-size:.78rem;color:var(--dim)}

/* image / gif messages */
.msg-img{max-width:320px;max-height:280px;border-radius:10px;cursor:pointer;display:block;border:1px solid var(--border)}
.msg-img:hover{opacity:.9}

/* file attachment */
.msg-file{display:inline-flex;align-items:center;gap:.6rem;background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:.55rem .85rem;text-decoration:none;color:var(--text);font-size:.82rem;transition:border-color .15s;max-width:280px}
.msg-file:hover{border-color:var(--accent)}
.msg-file-icon{font-size:1.1rem;flex-shrink:0}
.msg-file-info{display:flex;flex-direction:column;min-width:0}
.msg-file-name{font-family:var(--font-mono);font-size:.75rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--accent)}
.msg-file-size{font-family:var(--font-mono);font-size:.6rem;color:var(--dim)}

/* upload progress */
.upload-progress{display:flex;align-items:center;gap:.6rem;font-family:var(--font-mono);font-size:.72rem;color:var(--dim);padding:.3rem 0}
.progress-bar-wrap{flex:1;height:3px;background:var(--muted);border-radius:3px;overflow:hidden}
.progress-bar{height:100%;background:var(--accent);border-radius:3px;transition:width .2s}

/* ── FOOTER ── */
footer{padding:.75rem 1.4rem;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0}
.in-row{display:flex;gap:.5rem;align-items:center}
.action-btn{background:none;border:1px solid var(--border);border-radius:9px;padding:.65rem .75rem;color:var(--dim);cursor:pointer;font-size:.85rem;line-height:1;transition:border-color .15s,color .15s,background .15s;flex-shrink:0}
.action-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
.action-btn:disabled{opacity:.3;cursor:not-allowed}
.in-row input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:.7rem 1.1rem;color:var(--text);font-family:var(--font-sans);font-size:.88rem;outline:none;transition:border-color .2s}
.in-row input:focus{border-color:var(--border2)}
.in-row input::placeholder{color:var(--dim)}
.in-row input:disabled{opacity:.4;cursor:not-allowed}
.send-btn{background:var(--accent-dim);border:1px solid rgba(232,255,107,.2);border-radius:9px;padding:.7rem .95rem;color:var(--accent);cursor:pointer;font-size:.95rem;line-height:1;transition:background .15s,border-color .15s;flex-shrink:0}
.send-btn:hover{background:rgba(232,255,107,.2)}
.send-btn:disabled{opacity:.3;cursor:not-allowed}

/* ── MODALS ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:40;align-items:center;justify-content:center;padding:1.5rem}
.modal-bg.show{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.8rem;width:100%;max-width:320px;display:flex;flex-direction:column;gap:1.2rem;animation:fadeUp .22s ease both}
.modal h2{font-size:1rem;font-weight:600;color:#e8edf8}
.modal-btns{display:flex;gap:.6rem;justify-content:flex-end}
.danger-btn{padding:.6rem 1rem;background:var(--danger);color:#fff;border:none;border-radius:8px;font-family:var(--font-mono);font-size:.8rem;font-weight:500;cursor:pointer;transition:opacity .15s}
.danger-btn:hover{opacity:.85}

/* ── GIF PICKER ── */
#gif-modal .modal{max-width:480px;max-height:80vh;overflow:hidden;display:flex;flex-direction:column}
.gif-search-row{display:flex;gap:.5rem}
.gif-search-row input{flex:1;background:var(--bg);border:1px solid var(--muted);border-radius:8px;padding:.6rem .9rem;color:var(--text);font-family:var(--font-mono);font-size:.85rem;outline:none}
.gif-search-row input:focus{border-color:var(--accent)}
.gif-search-btn{background:var(--accent);color:#0a0c10;border:none;border-radius:8px;padding:.6rem 1rem;font-family:var(--font-mono);font-size:.8rem;font-weight:500;cursor:pointer}
.gif-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;overflow-y:auto;margin-top:.3rem;max-height:340px}
.gif-grid::-webkit-scrollbar{width:3px}
.gif-grid::-webkit-scrollbar-thumb{background:var(--muted)}
.gif-item{aspect-ratio:1;border-radius:8px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:border-color .15s}
.gif-item:hover{border-color:var(--accent)}
.gif-item img{width:100%;height:100%;object-fit:cover;display:block}
.gif-empty{font-family:var(--font-mono);font-size:.75rem;color:var(--dim);text-align:center;padding:2rem;grid-column:span 3}

/* image lightbox */
#lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:50;align-items:center;justify-content:center;cursor:zoom-out}
#lightbox.show{display:flex}
#lightbox img{max-width:92vw;max-height:92vh;border-radius:10px;object-fit:contain}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes msgIn{from{opacity:0;transform:translateX(-4px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
</style>
</head>
<body>

<!-- NAME SCREEN -->
<div class="screen" id="screen-name">
  <div class="panel">
    <div class="brand"><div class="brand-dot"></div><div class="brand-name">LOCALCHAT</div></div>
    <div class="panel-title">What's your <span>name?</span></div>
    <div class="field">
      <label>Display name</label>
      <input id="nameInput" type="text" placeholder="e.g. Sarah" maxlength="28" autocomplete="off"/>
    </div>
    <div class="field">
      <label>Join code</label>
      <input id="codeInput" type="password" placeholder="Enter the code to join" maxlength="64" autocomplete="off"/>
    </div>
    <div class="err-msg" id="name-err"></div>
    <button class="primary-btn" id="joinBtn" onclick="joinChat()">Start chatting →</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div id="sidebar">
    <div class="sb-head"><div class="brand-dot"></div><div class="brand-name">LOCALCHAT</div></div>
    <div class="sb-section">
      <span class="sb-label">Servers</span>
      <button class="sb-add" onclick="openSrvModal()" title="New server">＋</button>
    </div>
    <div class="srv-list" id="srvList"></div>
    <div class="sb-divider"></div>
    <div class="sb-section"><span class="sb-label">Online — <span id="onlineCount">0</span></span></div>
    <div class="member-scroll"><div class="mem-list" id="memList"></div></div>
    <div class="sb-foot">
      <div class="me-row" onclick="renameMe()">
        <div class="me-avatar" id="meAvatar">?</div>
        <div class="me-name" id="meName"></div>
        <div class="me-edit">✎</div>
      </div>
    </div>
  </div>

  <div id="main">
    <div class="chat-bar">
      <span class="chat-hash">#</span>
      <span class="chat-title" id="chatTitle">—</span>
      <div class="chat-sep"></div>
      <div class="chat-online"><div class="ol-dot"></div><span id="chatOnline">0</span> in here</div>
      <button class="delete-chat-btn" onclick="promptDeleteChat()" id="deleteChatBtn" style="display:none">🗑 clear chat</button>
    </div>
    <div class="status-bar" id="statusBar"><span>⚠</span><span id="statusMsg">Reconnecting…</span></div>
    <div id="messages">
      <div class="empty" id="emptyState"><div class="empty-icon">💬</div><div class="empty-text">Pick a server to start chatting</div></div>
    </div>
    <footer>
      <div class="in-row">
        <button class="action-btn" id="fileBtn" onclick="document.getElementById('fileInput').click()" disabled title="Send file or image">＋</button>
        <button class="action-btn" id="gifBtn" onclick="openGifModal()" disabled title="Send a GIF">GIF</button>
        <input id="msgInput" type="text" placeholder="Message…" maxlength="500" autocomplete="off" disabled/>
        <button class="send-btn" onclick="sendMsg()" id="sendBtn" disabled>↑</button>
      </div>
    </footer>
  </div>
</div>

<!-- hidden file input -->
<input type="file" id="fileInput" style="display:none" onchange="handleFileUpload(this)"/>

<!-- ADD SERVER MODAL -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h2>New server</h2>
    <div class="field">
      <label>Name</label>
      <input id="srvNameInput" type="text" placeholder="e.g. lounge" maxlength="24" autocomplete="off"/>
    </div>
    <div class="modal-btns">
      <button class="ghost-btn" onclick="closeSrvModal()">Cancel</button>
      <button class="primary-btn" style="padding:.6rem 1.2rem" onclick="createServer()">Create</button>
    </div>
  </div>
</div>

<!-- DELETE CHAT MODAL -->
<div class="modal-bg" id="delete-modal">
  <div class="modal">
    <h2>Clear chat history</h2>
    <p style="font-size:.82rem;color:var(--dim);line-height:1.5">Enter the master password to delete all messages in <strong id="deleteServerName" style="color:var(--text)"></strong>. This cannot be undone.</p>
    <div class="field">
      <label>Master password</label>
      <input id="masterPwInput" type="password" placeholder="Master password" autocomplete="off"/>
    </div>
    <div class="err-msg" id="delete-err"></div>
    <div class="modal-btns">
      <button class="ghost-btn" onclick="closeDeleteModal()">Cancel</button>
      <button class="danger-btn" onclick="deleteChat()">Delete all messages</button>
    </div>
  </div>
</div>

<!-- GIF PICKER MODAL -->
<div class="modal-bg" id="gif-modal">
  <div class="modal" style="max-width:480px">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <h2>Send a GIF</h2>
      <button class="ghost-btn" style="padding:.3rem .7rem" onclick="closeGifModal()">✕</button>
    </div>
    <div class="gif-search-row">
      <input id="gifSearch" type="text" placeholder="Search Giphy…" autocomplete="off"/>
      <button class="gif-search-btn" onclick="searchGifs()">Search</button>
    </div>
    <div class="gif-grid" id="gifGrid"><div class="gif-empty">Search for GIFs above</div></div>
  </div>
</div>

<!-- IMAGE LIGHTBOX -->
<div id="lightbox" onclick="this.classList.remove('show')">
  <img id="lightboxImg" src="" alt=""/>
</div>

<script>
// ─────────────────────────────────────────────────────────────
//  CONFIG
// ─────────────────────────────────────────────────────────────
const FB_CONFIG = {
  apiKey: "AIzaSyCBeIg5wfpDuLsZWK8am4hvNnueVU3FF20",
  authDomain: "test-chat2-89c58.firebaseapp.com",
  databaseURL: "https://test-chat2-89c58-default-rtdb.firebaseio.com",
  projectId: "test-chat2-89c58",
  storageBucket: "test-chat2-89c58.firebasestorage.app",
  messagingSenderId: "557960980063",
  appId: "1:557960980063:web:c66996758ba41803d79dea"
};

const DEFAULTS = ['general','random','lounge'];

let db, storage, myName, myId, currentSrv = null;
let presenceRef = null, srvListeners = {}, members = {}, servers = {};
let tenorKey = null; // kept as variable name for compat, stores Giphy key

// ─────────────────────────────────────────────────────────────
//  BOOT
// ─────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  firebase.initializeApp(FB_CONFIG);
  db      = firebase.database();
  storage = firebase.storage();

  db.ref('.info/connected').on('value', snap => {
    const bar = document.getElementById('statusBar');
    if (snap.val()) { bar.classList.remove('show'); if (presenceRef) broadcastPresence(); }
    else { bar.classList.add('show'); document.getElementById('statusMsg').textContent = 'Reconnecting…'; }
  });

  const savedName = localStorage.getItem('lc_name');
  if (savedName) document.getElementById('nameInput').value = savedName;

  ['nameInput','srvNameInput'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener('keypress', e => { if (!/^[a-zA-Z ]$/.test(e.key)) e.preventDefault(); });
    el.addEventListener('input', e => { e.target.value = e.target.value.replace(/[^a-zA-Z ]/g,''); });
  });

  document.getElementById('nameInput').addEventListener('keydown', e => { if (e.key==='Enter') document.getElementById('codeInput').focus(); });
  document.getElementById('codeInput').addEventListener('keydown', e => { if (e.key==='Enter') joinChat(); });
  document.getElementById('msgInput').addEventListener('keydown', e => { if (e.key==='Enter') sendMsg(); });
  document.getElementById('srvNameInput').addEventListener('keydown', e => { if (e.key==='Enter') createServer(); });
  document.getElementById('masterPwInput').addEventListener('keydown', e => { if (e.key==='Enter') deleteChat(); });
  document.getElementById('gifSearch').addEventListener('keydown', e => { if (e.key==='Enter') searchGifs(); });

  document.getElementById('modal-bg').addEventListener('click', e => { if (e.target===document.getElementById('modal-bg')) closeSrvModal(); });
  document.getElementById('delete-modal').addEventListener('click', e => { if (e.target===document.getElementById('delete-modal')) closeDeleteModal(); });
  document.getElementById('gif-modal').addEventListener('click', e => { if (e.target===document.getElementById('gif-modal')) closeGifModal(); });
});

// ─────────────────────────────────────────────────────────────
//  HASH UTIL
// ─────────────────────────────────────────────────────────────
async function sha256(s) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// ─────────────────────────────────────────────────────────────
//  JOIN
// ─────────────────────────────────────────────────────────────
function joinChat() {
  const n    = document.getElementById('nameInput').value.trim();
  const code = document.getElementById('codeInput').value.trim();
  const err  = document.getElementById('name-err');
  const btn  = document.getElementById('joinBtn');
  if (!n || n.length < 2) { err.textContent = '⚠ Name must be at least 2 letters.'; return; }
  if (!code)               { err.textContent = '⚠ Enter the join code.'; return; }
  err.textContent = ''; btn.textContent = 'Checking…'; btn.disabled = true;

  Promise.all([sha256(code), db.ref('config').get()]).then(([inputHash, snap]) => {
    const cfg = snap.val() || {};

    // support both hashed (joinCodeHash) and legacy plain text (joinCode)
    const storedHash  = cfg.joinCodeHash;
    const storedPlain = cfg.joinCode;
    const match = storedHash
      ? inputHash === storedHash
      : code === String(storedPlain);

    if (!storedHash && !storedPlain) { err.textContent = '⚠ No join code set in Firebase.'; reset(); return; }
    if (!match) { err.textContent = '⚠ Wrong code. Try again.'; document.getElementById('codeInput').value=''; document.getElementById('codeInput').focus(); reset(); return; }

    if (cfg.giphyKey) tenorKey = cfg.giphyKey;

    myName = n; myId = 'u' + Date.now().toString(36) + Math.random().toString(36).slice(2,5);
    localStorage.setItem('lc_name', myName);
    document.getElementById('screen-name').classList.add('hidden');
    document.getElementById('app').style.display = 'flex';
    document.getElementById('meName').textContent = myName;
    document.getElementById('meAvatar').textContent = myName[0].toUpperCase();
    loadServers(); startPresence();
  }).catch(e => { err.textContent = '⚠ ' + (e.message || 'Connection error'); reset(); });

  function reset() { btn.textContent = 'Start chatting →'; btn.disabled = false; }
}

// ─────────────────────────────────────────────────────────────
//  SERVERS
// ─────────────────────────────────────────────────────────────
function loadServers() {
  DEFAULTS.forEach(name => { db.ref('servers/' + slugify(name)).set({ name, id: slugify(name) }); });
  db.ref('servers').on('value', snap => {
    servers = {};
    snap.forEach(child => { servers[child.key] = child.val(); });
    renderSrvList();
    if (!currentSrv && servers['general']) switchServer('general', 'general');
  });
}

function renderSrvList() {
  const el = document.getElementById('srvList'); el.innerHTML = '';
  Object.entries(servers).sort((a,b)=>a[1].name.localeCompare(b[1].name)).forEach(([id,srv]) => {
    const d = document.createElement('div');
    d.className = 'srv-item' + (currentSrv?.id===id ? ' active' : '');
    d.innerHTML = `<span class="srv-hash">#</span><span>${esc(srv.name)}</span>`;
    d.onclick = () => switchServer(id, srv.name);
    el.appendChild(d);
  });
}

function switchServer(id, name) {
  if (currentSrv && srvListeners[currentSrv.id]) {
    db.ref('messages/'+currentSrv.id).off('child_added', srvListeners[currentSrv.id]);
    delete srvListeners[currentSrv.id];
  }
  currentSrv = { id, name };
  document.getElementById('chatTitle').textContent = name;
  document.getElementById('messages').innerHTML = '';
  document.getElementById('deleteServerName').textContent = '#' + name;
  document.getElementById('msgInput').disabled = false;
  document.getElementById('sendBtn').disabled  = false;
  document.getElementById('fileBtn').disabled  = false;
  document.getElementById('gifBtn').disabled   = false;
  document.getElementById('deleteChatBtn').style.display = 'block';
  document.getElementById('msgInput').focus();
  renderSrvList(); broadcastPresence();

  const listener = db.ref('messages/'+id).limitToLast(100)
    .on('child_added', snap => { if (snap.val()) appendMsg(snap.key, snap.val()); });
  srvListeners[id] = listener;
}

function openSrvModal()  { document.getElementById('modal-bg').classList.add('show'); setTimeout(()=>document.getElementById('srvNameInput').focus(),50); }
function closeSrvModal() { document.getElementById('modal-bg').classList.remove('show'); }

function createServer() {
  const raw = document.getElementById('srvNameInput').value.trim();
  if (!raw || raw.length < 2) return;
  const name = raw.toLowerCase().replace(/\s+/g,'-');
  const id   = slugify(name)+'-'+Date.now().toString(36);
  db.ref('servers/'+id).set({ name, id });
  closeSrvModal();
  setTimeout(() => switchServer(id, name), 300);
}

// ─────────────────────────────────────────────────────────────
const BAD = ['fuck','fuk','fucc','fck','shit','bitch','biatch','cunt','dick','cock','pussy',
  'nigger','nigga','nigg','faggot','fag','chink','spic','spik','wetback','kike',
  'whore','slut','bastard','twat','prick','asshole','arsehole','wanker','tosser','bellend',
  'motherfucker','mofo','retard','tranny','shemale','coon','gook','jap','raghead','cracker'];
function censor(text) {
  let out = text;
  BAD.forEach(w => {
    const pattern = w.split('').map(c => { const s={a:'[a@4]',e:'[e3]',i:'[i1!|]',o:'[o0]',s:'[s$5]',t:'[t7+]'}; return s[c]||c.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }).join('[\\s._\\-*]*');
    out = out.replace(new RegExp('\\b'+pattern+'\\b','gi'), m=>'*'.repeat(m.length));
  });
  return out;
}

// ─────────────────────────────────────────────────────────────
//  MESSAGING
// ─────────────────────────────────────────────────────────────
function sendMsg() {
  if (!currentSrv) return;
  const inp = document.getElementById('msgInput');
  const raw = inp.value.trim(); if (!raw) return;
  inp.value = '';
  const msg = { name: myName, text: censor(raw), ts: firebase.database.ServerValue.TIMESTAMP, type: 'text' };
  db.ref('messages/'+currentSrv.id).push(msg)
    .catch(() => { sysMsg('⚠ Message failed.'); inp.value = raw; });
}

// ─────────────────────────────────────────────────────────────
//  FILE / IMAGE UPLOAD
// ─────────────────────────────────────────────────────────────
function handleFileUpload(input) {
  const file = input.files[0]; if (!file || !currentSrv) return;
  input.value = '';

  const isImage = file.type.startsWith('image/');
  const path    = `uploads/${currentSrv.id}/${Date.now()}_${file.name}`;
  const ref     = storage.ref(path);
  const task    = ref.put(file);

  // show progress in chat
  const progId  = 'prog-' + Date.now();
  appendProgress(progId, file.name, isImage);

  task.on('state_changed',
    snap => {
      const pct = Math.round(snap.bytesTransferred / snap.totalBytes * 100);
      const bar = document.getElementById('bar-' + progId);
      const lbl = document.getElementById('lbl-' + progId);
      if (bar) bar.style.width = pct + '%';
      if (lbl) lbl.textContent = file.name + ' — ' + pct + '%';
    },
    err => {
      removeProgress(progId);
      sysMsg('⚠ Upload failed: ' + err.message);
    },
    () => {
      task.snapshot.ref.getDownloadURL().then(url => {
        removeProgress(progId);
        const msg = {
          name: myName,
          ts: firebase.database.ServerValue.TIMESTAMP,
          type: isImage ? 'image' : 'file',
          url,
          fileName: file.name,
          fileSize: file.size
        };
        db.ref('messages/'+currentSrv.id).push(msg);
      });
    }
  );
}

function appendProgress(id, name, isImage) {
  const box  = document.getElementById('messages');
  const wrap = document.createElement('div'); wrap.className='msg sys'; wrap.id='prog-'+id;
  const body = document.createElement('div'); body.className='msg-body';
  const row  = document.createElement('div'); row.className='upload-progress';
  row.innerHTML = `<span id="lbl-${id}" style="flex:1;font-size:.72rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(name)} — 0%</span><div class="progress-bar-wrap"><div class="progress-bar" id="bar-${id}" style="width:0%"></div></div>`;
  body.appendChild(row); wrap.appendChild(body); box.appendChild(wrap); box.scrollTop=box.scrollHeight;
}

function removeProgress(id) {
  const el = document.getElementById('prog-'+id); if (el) el.remove();
}

// ─────────────────────────────────────────────────────────────
//  GIF PICKER  (Giphy)
// ─────────────────────────────────────────────────────────────
function openGifModal() {
  if (!tenorKey) { sysMsg('⚠ No Giphy key set. Add config/giphyKey in Firebase Console.'); return; }
  document.getElementById('gif-modal').classList.add('show');
  setTimeout(() => document.getElementById('gifSearch').focus(), 50);
  searchGifs('trending');
}
function closeGifModal() { document.getElementById('gif-modal').classList.remove('show'); }

function searchGifs(query) {
  const q    = query || document.getElementById('gifSearch').value.trim();
  const grid = document.getElementById('gifGrid');
  if (!q) return;
  grid.innerHTML = '<div class="gif-empty">Loading…</div>';

  const endpoint = q === 'trending'
    ? `https://api.giphy.com/v1/gifs/trending?api_key=${tenorKey}&limit=18&rating=pg-13`
    : `https://api.giphy.com/v1/gifs/search?api_key=${tenorKey}&q=${encodeURIComponent(q)}&limit=18&rating=pg-13`;

  fetch(endpoint)
    .then(r => r.json())
    .then(data => {
      grid.innerHTML = '';
      if (!data.data || !data.data.length) { grid.innerHTML='<div class="gif-empty">No results</div>'; return; }
      data.data.forEach(gif => {
        const preview = gif.images.fixed_height_small.url;
        const full    = gif.images.original.url;
        const item = document.createElement('div'); item.className='gif-item';
        const img  = document.createElement('img'); img.src=preview; img.loading='lazy';
        item.appendChild(img);
        item.onclick = () => { sendGif(full, gif.title||'GIF'); closeGifModal(); };
        grid.appendChild(item);
      });
    })
    .catch(() => { grid.innerHTML='<div class="gif-empty">Failed to load GIFs</div>'; });
}

function sendGif(url, title) {
  if (!currentSrv) return;
  db.ref('messages/'+currentSrv.id).push({ name: myName, ts: firebase.database.ServerValue.TIMESTAMP, type: 'gif', url, fileName: title });
}

// ─────────────────────────────────────────────────────────────
//  RENDER MESSAGES
// ─────────────────────────────────────────────────────────────
function appendMsg(key, data) {
  const box    = document.getElementById('messages');
  const isSelf = data.name === myName;
  const wrap   = document.createElement('div');
  wrap.className = 'msg '+(isSelf?'self':'other'); wrap.dataset.key=key;

  const time = document.createElement('span'); time.className='msg-time'; time.textContent=fmt(data.ts);
  const name = document.createElement('span'); name.className='msg-name'; name.textContent=data.name+':';
  const body = document.createElement('div'); body.className='msg-body';

  const type = data.type || 'text';

  if (type === 'text') {
    const txt = document.createElement('span'); txt.className='msg-text'; txt.textContent=data.text;
    body.appendChild(txt);

  } else if (type === 'image' || type === 'gif') {
    const img = document.createElement('img'); img.className='msg-img'; img.src=data.url;
    img.alt = data.fileName||'image'; img.loading='lazy';
    img.onclick = () => { document.getElementById('lightboxImg').src=data.url; document.getElementById('lightbox').classList.add('show'); };
    body.appendChild(img);

  } else if (type === 'file') {
    const a = document.createElement('a'); a.className='msg-file'; a.href=data.url; a.target='_blank'; a.rel='noopener';
    const icon = document.createElement('span'); icon.className='msg-file-icon'; icon.textContent='📎';
    const info = document.createElement('div'); info.className='msg-file-info';
    const fname = document.createElement('span'); fname.className='msg-file-name'; fname.textContent=data.fileName||'file';
    const fsize = document.createElement('span'); fsize.className='msg-file-size'; fsize.textContent=fmtSize(data.fileSize||0);
    info.append(fname, fsize); a.append(icon, info); body.appendChild(a);
  }

  wrap.append(time, name, body);
  box.appendChild(wrap);
  box.scrollTop = box.scrollHeight;
}

function sysMsg(text) {
  const box=document.getElementById('messages');
  const w=document.createElement('div'); w.className='msg sys';
  const t=document.createElement('span'); t.className='msg-text'; t.textContent=text;
  w.appendChild(t); box.appendChild(w); box.scrollTop=box.scrollHeight;
}

// ─────────────────────────────────────────────────────────────
//  DELETE CHAT
// ─────────────────────────────────────────────────────────────
function promptDeleteChat() {
  document.getElementById('masterPwInput').value = '';
  document.getElementById('delete-err').textContent = '';
  document.getElementById('delete-modal').classList.add('show');
  setTimeout(() => document.getElementById('masterPwInput').focus(), 50);
}
function closeDeleteModal() { document.getElementById('delete-modal').classList.remove('show'); }

function deleteChat() {
  const pw  = document.getElementById('masterPwInput').value.trim();
  const err = document.getElementById('delete-err');
  if (!pw) { err.textContent = '⚠ Enter the master password.'; return; }

  Promise.all([sha256(pw), db.ref('config').get()]).then(([inputHash, snap]) => {
    const cfg = snap.val() || {};
    const storedHash  = cfg.masterPasswordHash;
    const storedPlain = cfg.masterPassword;
    const match = storedHash
      ? inputHash === storedHash
      : pw === String(storedPlain);

    if (!storedHash && !storedPlain) { err.textContent = '⚠ No master password set in Firebase.'; return; }
    if (!match) { err.textContent = '⚠ Wrong password.'; document.getElementById('masterPwInput').value=''; return; }

    db.ref('messages/'+currentSrv.id).remove().then(() => {
      closeDeleteModal();
      document.getElementById('messages').innerHTML = '';
      sysMsg('Chat history cleared by ' + myName);
    }).catch(e => { err.textContent = '⚠ Delete failed: ' + e.message; });
  }).catch(e => { err.textContent = '⚠ ' + e.message; });
}

// ─────────────────────────────────────────────────────────────
//  PRESENCE
// ─────────────────────────────────────────────────────────────
function startPresence() {
  presenceRef = db.ref('presence/'+myId);
  presenceRef.onDisconnect().remove();
  broadcastPresence();
  setInterval(broadcastPresence, 8000);
  db.ref('presence').on('value', snap => {
    members = {};
    snap.forEach(child => { const d=child.val(); if (d&&d.name) members[child.key]=d; });
    renderMembers();
  });
}

function broadcastPresence() {
  if (!presenceRef) return;
  presenceRef.set({ name: myName, ts: firebase.database.ServerValue.TIMESTAMP, server: currentSrv?currentSrv.id:null });
}

function renderMembers() {
  const list=document.getElementById('memList'), count=document.getElementById('onlineCount'), cCount=document.getElementById('chatOnline');
  list.innerHTML='';
  const entries=Object.entries(members);
  count.textContent=entries.length;
  cCount.textContent=currentSrv?entries.filter(([,m])=>m.server===currentSrv.id).length:0;
  entries.sort((a,b)=>a[1].name.localeCompare(b[1].name)).forEach(([uid,m]) => {
    const isMe=uid===myId, d=document.createElement('div');
    d.className='mem-item'+(isMe?' me':'');
    d.innerHTML=`<div class="mem-dot"></div><span class="mem-name">${esc(m.name)}</span>${isMe?'<span class="you-badge">you</span>':''}`;
    list.appendChild(d);
  });
}

// ─────────────────────────────────────────────────────────────
//  RENAME
// ─────────────────────────────────────────────────────────────
function renameMe() {
  const raw=prompt('New name (letters only):',myName); if (!raw) return;
  const n=raw.replace(/[^a-zA-Z ]/g,'').trim(); if (!n||n.length<2||n===myName) return;
  myName=n; localStorage.setItem('lc_name',myName);
  document.getElementById('meName').textContent=myName;
  document.getElementById('meAvatar').textContent=myName[0].toUpperCase();
  broadcastPresence();
}

// ─────────────────────────────────────────────────────────────
//  UTILS
// ─────────────────────────────────────────────────────────────
function fmt(ts) { if (!ts) return ''; const d=new Date(ts); return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0'); }
function fmtSize(b) { if (b<1024) return b+'B'; if (b<1048576) return (b/1024).toFixed(1)+'KB'; return (b/1048576).toFixed(1)+'MB'; }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function slugify(s) { return s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,''); }
