<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>localchat</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0c10;
  --sidebar:#0f1117;
  --surface:#13151d;
  --border:#1a1e2e;
  --accent:#5cefb0;
  --blue:#4fc3f7;
  --purple:#b48eff;
  --muted:#2a2f42;
  --text:#cdd6f4;
  --dim:#4a5370;
  --online:#3ddc84;
  --font-mono:'IBM Plex Mono',monospace;
  --font-sans:'IBM Plex Sans',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-sans);overflow:hidden}

/* ── SETUP ── */
#setup{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  background:var(--bg);z-index:20;padding:1.5rem;
}
.card{
  width:100%;max-width:380px;background:var(--surface);
  border:1px solid var(--border);border-radius:16px;
  padding:2.5rem 2rem;display:flex;flex-direction:column;gap:1.5rem;
  animation:fadeUp .35s ease both;
}
.logo{
  font-family:var(--font-mono);font-size:.8rem;letter-spacing:.15em;
  color:var(--accent);display:flex;align-items:center;gap:.5rem;
}
.logo-dot{
  width:9px;height:9px;border-radius:50%;background:var(--accent);
  box-shadow:0 0 10px var(--accent);animation:pulse 2s ease-in-out infinite;
}
.card h1{font-size:1.6rem;font-weight:300;line-height:1.3;color:#fff}
.card h1 strong{font-weight:500}
.field{display:flex;flex-direction:column;gap:.4rem}
.field label{font-family:var(--font-mono);font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--dim)}
.field input{
  background:var(--bg);border:1px solid var(--muted);border-radius:9px;
  padding:.75rem 1rem;color:var(--text);font-family:var(--font-mono);
  font-size:.95rem;outline:none;transition:border-color .2s,box-shadow .2s;
}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(92,239,176,.1)}
.field input::placeholder{color:var(--dim)}
.join-btn{
  padding:.85rem;background:var(--accent);color:#080a0e;
  font-family:var(--font-mono);font-size:.9rem;font-weight:600;
  letter-spacing:.05em;border:none;border-radius:10px;cursor:pointer;
  transition:opacity .15s,transform .1s;
}
.join-btn:hover{opacity:.87}
.join-btn:active{transform:scale(.98)}

/* ── APP SHELL ── */
#app{display:none;height:100vh;flex-direction:row}

/* ── SIDEBAR ── */
#sidebar{
  width:220px;min-width:220px;background:var(--sidebar);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
.sidebar-header{
  padding:.85rem 1rem .7rem;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:.5rem;
  flex-shrink:0;
}
.sidebar-logo{font-family:var(--font-mono);font-size:.72rem;letter-spacing:.12em;color:var(--accent);font-weight:600}
.sidebar-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 6px var(--accent);animation:pulse 2s ease-in-out infinite}

.section-label{
  font-family:var(--font-mono);font-size:.58rem;letter-spacing:.13em;
  text-transform:uppercase;color:var(--dim);padding:.9rem 1rem .4rem;
  display:flex;align-items:center;justify-content:space-between;
}
.add-btn{
  background:none;border:none;color:var(--dim);cursor:pointer;
  font-size:1rem;line-height:1;padding:0 .2rem;
  transition:color .15s;
}
.add-btn:hover{color:var(--accent)}

.server-list{display:flex;flex-direction:column;gap:.1rem;padding:0 .5rem;flex-shrink:0}
.server-item{
  display:flex;align-items:center;gap:.55rem;
  padding:.5rem .6rem;border-radius:7px;cursor:pointer;
  transition:background .15s;font-size:.85rem;
  color:var(--dim);
}
.server-item:hover{background:rgba(255,255,255,.04);color:var(--text)}
.server-item.active{background:rgba(92,239,176,.1);color:var(--accent)}
.server-item.active .s-hash{color:var(--accent)}
.s-hash{font-family:var(--font-mono);font-size:.8rem;color:var(--muted);flex-shrink:0}

.divider{height:1px;background:var(--border);margin:.6rem .75rem}

.members-section{flex:1;overflow-y:auto;padding-bottom:.5rem}
.members-section::-webkit-scrollbar{width:3px}
.members-section::-webkit-scrollbar-thumb{background:var(--muted)}
.member-list{display:flex;flex-direction:column;gap:.05rem;padding:0 .5rem}
.member-item{
  display:flex;align-items:center;gap:.55rem;
  padding:.4rem .6rem;border-radius:7px;
  font-size:.82rem;color:var(--dim);
  font-family:var(--font-sans);
}
.member-item.is-you{color:var(--text)}
.member-dot{width:7px;height:7px;border-radius:50%;background:var(--online);flex-shrink:0;box-shadow:0 0 5px var(--online)}
.member-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.you-tag{font-family:var(--font-mono);font-size:.6rem;color:var(--accent);margin-left:.2rem}

/* rename button at bottom */
.sidebar-footer{
  padding:.65rem .75rem;border-top:1px solid var(--border);flex-shrink:0;
}
.rename-row{
  display:flex;align-items:center;gap:.5rem;
  padding:.45rem .6rem;border-radius:7px;cursor:pointer;
  transition:background .15s;
}
.rename-row:hover{background:rgba(255,255,255,.04)}
.rename-avatar{
  width:26px;height:26px;border-radius:50%;
  background:rgba(92,239,176,.15);border:1px solid rgba(92,239,176,.3);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-mono);font-size:.7rem;color:var(--accent);font-weight:600;
  flex-shrink:0;
}
.rename-name{font-size:.8rem;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rename-icon{font-size:.75rem;color:var(--dim)}

/* ── MAIN CHAT ── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}

.chat-header{
  display:flex;align-items:center;gap:.6rem;
  padding:.8rem 1.25rem;background:var(--surface);
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.chat-hash{font-family:var(--font-mono);font-size:.9rem;color:var(--dim)}
.chat-room-name{font-family:var(--font-mono);font-size:.85rem;color:var(--text);font-weight:600}
.chat-divider{width:1px;height:14px;background:var(--border);margin:0 .3rem}
.chat-member-count{font-family:var(--font-mono);font-size:.68rem;color:var(--dim)}
.online-dot-sm{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--online);margin-right:.3rem;vertical-align:middle}

#messages{
  flex:1;overflow-y:auto;padding:1rem 1.25rem;
  display:flex;flex-direction:column;gap:.08rem;scroll-behavior:smooth;
}
#messages::-webkit-scrollbar{width:3px}
#messages::-webkit-scrollbar-thumb{background:var(--muted);border-radius:3px}

.msg{
  display:flex;align-items:baseline;gap:.55rem;
  padding:.28rem .5rem;border-radius:6px;
  animation:msgIn .18s ease both;line-height:1.6;
}
.msg:hover{background:rgba(255,255,255,.025)}
.msg-time{font-family:var(--font-mono);font-size:.6rem;color:var(--muted);flex-shrink:0;user-select:none}
.msg-name{font-family:var(--font-mono);font-size:.76rem;font-weight:600;flex-shrink:0}
.msg-text{font-size:.88rem;color:var(--text);word-break:break-word;flex:1}
.msg.self .msg-name{color:var(--accent)}
.msg.other .msg-name{color:var(--blue)}
.msg.system{opacity:.4}
.msg.system .msg-text{color:var(--dim);font-style:italic;font-size:.78rem}

.empty-state{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:var(--dim);font-size:.85rem;gap:.5rem;opacity:.6;
}
.empty-icon{font-size:2rem;margin-bottom:.3rem}

footer{
  padding:.75rem 1.25rem;background:var(--surface);
  border-top:1px solid var(--border);flex-shrink:0;
}
.input-row{display:flex;gap:.6rem}
.input-row input{
  flex:1;background:var(--bg);border:1px solid var(--border);
  border-radius:9px;padding:.7rem 1rem;color:var(--text);
  font-family:var(--font-sans);font-size:.9rem;outline:none;
  transition:border-color .2s;
}
.input-row input:focus{border-color:var(--muted)}
.input-row input::placeholder{color:var(--dim)}
.send-btn{
  background:none;border:1px solid var(--muted);border-radius:9px;
  padding:.7rem 1rem;color:var(--dim);cursor:pointer;font-size:1rem;line-height:1;
  transition:border-color .15s,color .15s,background .15s;
}
.send-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(92,239,176,.07)}

/* ── ADD SERVER MODAL ── */
#modal-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);
  z-index:30;align-items:center;justify-content:center;padding:1.5rem;
}
#modal-overlay.show{display:flex}
.modal{
  background:var(--surface);border:1px solid var(--border);
  border-radius:14px;padding:2rem;width:100%;max-width:320px;
  display:flex;flex-direction:column;gap:1.2rem;
  animation:fadeUp .25s ease both;
}
.modal h2{font-size:1.1rem;font-weight:500;color:#fff}
.modal p{font-size:.82rem;color:var(--dim);line-height:1.5}
.modal-btns{display:flex;gap:.6rem;justify-content:flex-end}
.btn-cancel{
  padding:.55rem 1rem;background:none;border:1px solid var(--muted);
  border-radius:8px;color:var(--dim);font-family:var(--font-mono);
  font-size:.8rem;cursor:pointer;transition:border-color .15s,color .15s;
}
.btn-cancel:hover{border-color:var(--text);color:var(--text)}
.btn-create{
  padding:.55rem 1rem;background:var(--accent);color:#0a0c10;
  border:none;border-radius:8px;font-family:var(--font-mono);
  font-size:.8rem;font-weight:600;cursor:pointer;transition:opacity .15s;
}
.btn-create:hover{opacity:.85}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes msgIn{from{opacity:0;transform:translateX(-3px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
</style>
</head>
<body>

<!-- NAME SCREEN -->
<div id="setup">
  <div class="card">
    <div class="logo"><div class="logo-dot"></div>localchat</div>
    <h1>What's your <strong>name?</strong></h1>
    <div class="field">
      <label>Display name</label>
      <input id="nameInput" type="text" placeholder="e.g. Sarah" maxlength="28" autocomplete="off"/>
    </div>
    <button class="join-btn" onclick="join()">→ start chatting</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <!-- sidebar -->
  <div id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-dot"></div>
      <div class="sidebar-logo">localchat</div>
    </div>

    <div class="section-label">
      Servers
      <button class="add-btn" onclick="openModal()" title="Create server">＋</button>
    </div>
    <div class="server-list" id="serverList"></div>

    <div class="divider"></div>

    <div class="members-section">
      <div class="section-label">Online — <span id="memberCount">0</span></div>
      <div class="member-list" id="memberList"></div>
    </div>

    <div class="sidebar-footer">
      <div class="rename-row" onclick="rename()">
        <div class="rename-avatar" id="avatarInitial">?</div>
        <div class="rename-name" id="sidebarName"></div>
        <div class="rename-icon">✎</div>
      </div>
    </div>
  </div>

  <!-- chat area -->
  <div id="main">
    <div class="chat-header">
      <span class="chat-hash">#</span>
      <span class="chat-room-name" id="chatRoomName">—</span>
      <div class="chat-divider"></div>
      <span class="chat-member-count"><span class="online-dot-sm"></span><span id="chatMemberCount">0</span> online</span>
    </div>
    <div id="messages">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">💬</div>
        <div>Pick a server to start chatting</div>
      </div>
    </div>
    <footer>
      <div class="input-row">
        <input id="msgInput" type="text" placeholder="Message…" maxlength="500" autocomplete="off" disabled/>
        <button class="send-btn" onclick="send()" id="sendBtn" disabled>↑</button>
      </div>
    </footer>
  </div>
</div>

<!-- ADD SERVER MODAL -->
<div id="modal-overlay">
  <div class="modal">
    <h2>Create a server</h2>
    <p>Give your server a name. Anyone on this page can join.</p>
    <div class="field">
      <label>Server name</label>
      <input id="serverNameInput" type="text" placeholder="e.g. lounge" maxlength="24" autocomplete="off"/>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-create" onclick="createServer()">Create</button>
    </div>
  </div>
</div>

<script>
// ── config ──────────────────────────────────────────────────────────────────
const GUN_PEERS = [
  'https://gun-manhattan.herokuapp.com/gun',
  'https://gun-us.herokuapp.com/gun',
  'https://peer.wallie.io/gun'
];
const APP_KEY        = 'lc2-app';          // root gun node
const HEARTBEAT_MS   = 4000;               // presence ping
const PRESENCE_TTL   = 12000;              // consider offline after

// ── state ────────────────────────────────────────────────────────────────────
let gun, root, myName, myId, currentServer = null;
let heartbeatTimer = null;
let servers = {};      // { id: { name, ref } }
let members = {};      // { id: { name, ts } }
let msgSeen = new Set();
let presenceNode = null;

// ── name screen ──────────────────────────────────────────────────────────────
document.getElementById('nameInput').addEventListener('keypress', e => {
  if (!/^[a-zA-Z ]$/.test(e.key)) e.preventDefault();
});
document.getElementById('nameInput').addEventListener('input', e => {
  e.target.value = e.target.value.replace(/[^a-zA-Z ]/g, '');
});
document.getElementById('nameInput').addEventListener('keydown', e => { if (e.key==='Enter') join(); });
document.getElementById('msgInput').addEventListener('keydown', e => { if (e.key==='Enter') send(); });
document.getElementById('serverNameInput').addEventListener('keydown', e => { if (e.key==='Enter') createServer(); });

const savedName = localStorage.getItem('lc_name') || '';
if (savedName) document.getElementById('nameInput').value = savedName;

function join() {
  const n = document.getElementById('nameInput').value.trim();
  if (!n || n.length < 2) return;

  myName = n;
  myId   = 'u-' + Date.now() + '-' + Math.random().toString(36).slice(2,6);
  localStorage.setItem('lc_name', myName);

  document.getElementById('setup').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('sidebarName').textContent = myName;
  document.getElementById('avatarInitial').textContent = myName[0].toUpperCase();

  gun  = Gun(GUN_PEERS);
  root = gun.get(APP_KEY);

  loadServers();
  startPresence();
}

// ── servers ──────────────────────────────────────────────────────────────────
const DEFAULT_SERVERS = ['general','random','announcements'];

function loadServers() {
  // seed defaults
  DEFAULT_SERVERS.forEach(name => {
    const id = 'srv-' + name;
    root.get('servers').get(id).put({ name, id });
  });

  root.get('servers').map().on((data, key) => {
    if (!data || !data.name) return;
    servers[key] = data;
    renderServerList();
  });
}

function renderServerList() {
  const el = document.getElementById('serverList');
  el.innerHTML = '';
  Object.entries(servers).forEach(([id, srv]) => {
    const item = document.createElement('div');
    item.className = 'server-item' + (currentServer && currentServer.id === id ? ' active' : '');
    item.innerHTML = `<span class="s-hash">#</span><span>${srv.name}</span>`;
    item.onclick = () => switchServer(id, srv.name);
    el.appendChild(item);
  });
}

function switchServer(id, name) {
  currentServer = { id, name };
  msgSeen.clear();

  document.getElementById('chatRoomName').textContent = name;
  document.getElementById('emptyState')?.remove();
  document.getElementById('messages').innerHTML = '';

  document.getElementById('msgInput').disabled = false;
  document.getElementById('sendBtn').disabled  = false;
  document.getElementById('msgInput').focus();

  renderServerList();
  updatePresenceServer();

  // listen for messages in this server
  root.get('msgs').get(id).map().on((data, key) => {
    if (!data || msgSeen.has(key)) return;
    msgSeen.add(key);
    if (data.ts && Date.now() - data.ts > 24 * 60 * 60 * 1000) return;
    renderMsg(data);
  });
}

// ── add server modal ──────────────────────────────────────────────────────────
function openModal() {
  document.getElementById('modal-overlay').classList.add('show');
  document.getElementById('serverNameInput').value = '';
  // letters only for server names too
  document.getElementById('serverNameInput').focus();
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
}
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});
document.getElementById('serverNameInput').addEventListener('keypress', e => {
  if (!/^[a-zA-Z ]$/.test(e.key)) e.preventDefault();
});
document.getElementById('serverNameInput').addEventListener('input', e => {
  e.target.value = e.target.value.replace(/[^a-zA-Z ]/g, '');
});

function createServer() {
  const raw = document.getElementById('serverNameInput').value.trim();
  if (!raw || raw.length < 2) return;
  const name = raw.toLowerCase().replace(/\s+/g, '-');
  const id   = 'srv-' + name + '-' + Date.now();
  root.get('servers').get(id).put({ name, id });
  closeModal();
  setTimeout(() => switchServer(id, name), 200);
}

// ── messaging ────────────────────────────────────────────────────────────────
function send() {
  if (!currentServer) return;
  const inp  = document.getElementById('msgInput');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  const key = Date.now() + '-' + Math.random().toString(36).slice(2,7);
  root.get('msgs').get(currentServer.id).get(key).put({ name: myName, text, ts: Date.now() });
}

function renderMsg(data) {
  const box    = document.getElementById('messages');
  const isSelf = data.name === myName;
  const wrap   = document.createElement('div');
  wrap.className = 'msg ' + (isSelf ? 'self' : 'other');
  const time = document.createElement('span'); time.className='msg-time'; time.textContent=fmt(data.ts);
  const name = document.createElement('span'); name.className='msg-name'; name.textContent=data.name+':';
  const txt  = document.createElement('span'); txt.className='msg-text';  txt.textContent=data.text;
  wrap.append(time, name, txt);
  box.appendChild(wrap);
  box.scrollTop = box.scrollHeight;
}

// ── presence ─────────────────────────────────────────────────────────────────
function startPresence() {
  presenceNode = root.get('presence').get(myId);
  broadcastPresence();
  heartbeatTimer = setInterval(broadcastPresence, HEARTBEAT_MS);

  // listen to all presence
  root.get('presence').map().on((data, uid) => {
    if (!data || !data.name) return;
    members[uid] = { name: data.name, ts: data.ts, server: data.server };
    renderMembers();
  });

  // clean up stale members periodically
  setInterval(pruneMembers, 5000);
}

function broadcastPresence() {
  presenceNode.put({ name: myName, ts: Date.now(), server: currentServer ? currentServer.id : null });
}

function updatePresenceServer() {
  broadcastPresence();
}

function pruneMembers() {
  const now = Date.now();
  let changed = false;
  Object.keys(members).forEach(uid => {
    if (now - members[uid].ts > PRESENCE_TTL) {
      delete members[uid];
      changed = true;
    }
  });
  if (changed) renderMembers();
}

function renderMembers() {
  const list  = document.getElementById('memberList');
  const count = document.getElementById('memberCount');
  const chatC = document.getElementById('chatMemberCount');
  list.innerHTML = '';

  const now    = Date.now();
  const online = Object.entries(members).filter(([,m]) => now - m.ts < PRESENCE_TTL);
  const inRoom = currentServer ? online.filter(([,m]) => m.server === currentServer.id) : [];

  count.textContent = online.length;
  chatC.textContent = inRoom.length;

  online.sort((a,b) => a[1].name.localeCompare(b[1].name)).forEach(([uid, m]) => {
    const item = document.createElement('div');
    const isYou = uid === myId;
    item.className = 'member-item' + (isYou ? ' is-you' : '');
    item.innerHTML = `<div class="member-dot"></div><span class="member-name">${esc(m.name)}${isYou ? '<span class="you-tag">(you)</span>' : ''}</span>`;
    list.appendChild(item);
  });
}

// ── rename ───────────────────────────────────────────────────────────────────
function rename() {
  const raw = prompt('Change your name (letters only):', myName);
  if (!raw) return;
  const n = raw.replace(/[^a-zA-Z ]/g,'').trim();
  if (!n || n.length < 2 || n === myName) return;
  myName = n;
  localStorage.setItem('lc_name', myName);
  document.getElementById('sidebarName').textContent = myName;
  document.getElementById('avatarInitial').textContent = myName[0].toUpperCase();
  broadcastPresence();
}

// ── utils ────────────────────────────────────────────────────────────────────
function fmt(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}
function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
